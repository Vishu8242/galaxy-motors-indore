
<html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta name="description" content="Galaxy Motors is a popular used car dealer offering a wide range of second-hand cars.
They have brands like Maruti, Hyundai, and Tata in budget to premium segments..">
  <title>galaxymotorsindore</title>
  <script src="https://cdn.tailwindcss.com"></script>
   
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    body {
      box-sizing: border-box;
    }
    * {
      font-family: 'Outfit', sans-serif;
    }
    .gradient-text {
      background: linear-gradient(135deg, var(--primary-action) 0%, var(--secondary-action) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .card-hover {
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .card-hover:hover {
      transform: translateY(-12px) scale(1.02);
    }
    .btn-glow {
      position: relative;
      overflow: hidden;
    }
    .btn-glow::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }
    .btn-glow:hover::before {
      left: 100%;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    .animate-float {
      animation: float 6s ease-in-out infinite;
    }
    .animate-fade-in {
      animation: fadeInUp 0.8s ease-out forwards;
    }
    .animate-slide-in {
      animation: slideIn 0.6s ease-out forwards;
    }
    .delay-100 { animation-delay: 0.1s; }
    .delay-200 { animation-delay: 0.2s; }
    .delay-300 { animation-delay: 0.3s; }
    .delay-400 { animation-delay: 0.4s; }
    .delay-500 { animation-delay: 0.5s; }
    .nav-link {
      position: relative;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--primary-action);
      transition: width 0.3s ease;
    }
    .nav-link:hover::after {
      width: 100%;
    }
    .glass-effect {
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    :root {
      --background: #0a0a0f;
      --surface: #16161d;
      --text: #f5f5f7;
      --primary-action: #ff6b35;
      --secondary-action: #3b82f6;
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
 </head>
  <body>
    <noscript>Galaxy Motors is a popular used car dealer offering a wide range of second-hand cars.
They have brands like Maruti, Hyundai, and Tata in budget to premium segments.</noscript>
    <div id="root"></div>
   
  </body>
</html>
